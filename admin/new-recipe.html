<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Recipe CMS</title>
  <style>
    body{font-family:system-ui;margin:0;background:#f7f4ef;color:#222}
    main{max-width:850px;margin:30px auto;padding:20px}
    .card{background:white;border-radius:16px;padding:22px;margin:18px 0;box-shadow:0 2px 12px #0001}
    input,textarea{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:10px;font-size:16px}
    button{padding:12px 16px;border:0;border-radius:10px;background:#222;color:white;font-weight:700;margin:6px 6px 6px 0;cursor:pointer}
    .secondary{background:#666}.publish{background:#267a3e}
    .row{display:flex;gap:10px}.row>*{flex:1}
    .gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
    img{width:100%;border-radius:12px;object-fit:cover;max-height:180px}
    .preview{white-space:pre-wrap;background:#111;color:#eee;padding:18px;border-radius:12px;overflow:auto}
  </style>
</head>
<body>
<main>
  <h1>Recipe CMS</h1>

  <section class="card">
    <h2>Title</h2>
    <input id="title" placeholder="Vegan Buffalo Mac and Cheese">
  </section>

  <section class="card">
    <h2>Main Picture</h2>
    <input id="mainPic" type="file" accept="image/*">
  </section>

  <section class="card">
    <h2>Ingredients</h2>
    <div id="ingredients"></div>
    <button onclick="addField('ingredients','Ingredient')">+ Add Ingredient</button>
  </section>

  <section class="card">
    <h2>Directions</h2>
    <div id="directions"></div>
    <button onclick="addField('directions','Step')">+ Add Step</button>
  </section>

  <section class="card">
    <h2>Gallery</h2>
    <input id="galleryInput" type="file" accept="image/*" multiple>
    <div id="gallery" class="gallery"></div>
  </section>

  <section class="card">
    <h2>Categories</h2>
    <input id="categories" placeholder="Easy Vegan Recipes, Vegan Dinner, Comfort Food">
  </section>

  <section class="card">
    <button class="secondary" onclick="previewRecipe()">Preview New Recipe</button>
    <button class="publish" onclick="publishRecipe()">Publish New Recipe</button>
    <div id="output" class="preview"></div>
  </section>
</main>

<script>
const owner = "kevinkell-y";
const repo = "FoodBlog";
const branch = "main";

addField("ingredients","Ingredient");
addField("directions","Step");

function slugify(s){
  return s.toLowerCase().trim()
    .replace(/&/g,"and")
    .replace(/[^a-z0-9]+/g,"-")
    .replace(/^-|-$/g,"");
}

function addField(containerId, placeholder){
  const input = document.createElement("input");
  input.placeholder = placeholder;
  document.getElementById(containerId).appendChild(input);
}

galleryInput.onchange = () => {
  gallery.innerHTML = "";
  [...galleryInput.files].forEach(file => {
    const img = document.createElement("img");
    img.src = URL.createObjectURL(file);
    gallery.appendChild(img);
  });
};

function values(id){
  return [...document.querySelectorAll(`#${id} input`)]
    .map(i => i.value.trim())
    .filter(Boolean);
}

function buildMarkdown(){
  const title = document.getElementById("title").value.trim();
  const slug = slugify(title);
  const cats = categories.value.split(",").map(x=>x.trim()).filter(Boolean);
  const mainFile = mainPic.files[0];
  const mainImage = mainFile ? `/assets/images/${slug}/${mainFile.name}` : "";

  return `---
title: ${title}
date: ${new Date().toISOString().slice(0,10)}
layout: recipe
permalink: /${slug}/
image: ${mainImage}
categories:
${cats.map(c => `  - ${c}`).join("\n")}
tags:
${cats.map(c => `  - ${slugify(c)}`).join("\n")}
gallery:
${[...galleryInput.files].map(f => `  - /assets/images/${slug}/${f.name}`).join("\n")}
---

## Ingredients

${values("ingredients").map(x => `- ${x}`).join("\n")}

## Directions

${values("directions").map((x,i) => `${i+1}. ${x}`).join("\n")}
`;
}

function previewRecipe(){
  output.textContent = buildMarkdown();
}

async function fileToBase64(file){
  const buf = await file.arrayBuffer();
  let binary = "";
  new Uint8Array(buf).forEach(b => binary += String.fromCharCode(b));
  return btoa(binary);
}

async function putFile(path, contentBase64, token, message){
  const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
    method: "PUT",
    headers: {
      "Authorization": `Bearer ${token}`,
      "Accept": "application/vnd.github+json"
    },
    body: JSON.stringify({
      message,
      content: contentBase64,
      branch
    })
  });
  if(!res.ok) throw new Error(await res.text());
  return res.json();
}

async function publishRecipe(){
  previewRecipe();

  const token = prompt("Paste GitHub fine-grained token with Contents: Read/Write for FoodBlog. It is not saved.");
  if(!token) return;

  const title = document.getElementById("title").value.trim();
  const slug = slugify(title);
  const md = buildMarkdown();

  const allImages = [
    ...[...mainPic.files],
    ...[...galleryInput.files]
  ];

  for(const file of allImages){
    await putFile(
      `assets/images/${slug}/${file.name}`,
      await fileToBase64(file),
      token,
      `Add image for ${title}`
    );
  }

  await putFile(
    `_recipes/${slug}.md`,
    btoa(unescape(encodeURIComponent(md))),
    token,
    `Publish recipe: ${title}`
  );

  output.textContent = `Published.\nURL: https://veganandcheese.com/${slug}/`;
}
</script>
</body>
</html>
