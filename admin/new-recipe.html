<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Recipe CMS</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #f7f4ef;
      color: #222;
      margin: 0;
      padding: 30px;
    }

    .cms-wrap {
      max-width: 850px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 22px;
      margin-bottom: 18px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      padding: 12px 16px;
      border: 0;
      border-radius: 10px;
      background: #222;
      color: white;
      font-weight: 700;
      margin: 6px 6px 6px 0;
      cursor: pointer;
    }

    .publish {
      background: #267a3e;
    }

    .preview {
      white-space: pre-wrap;
      background: #111;
      color: #eee;
      padding: 18px;
      border-radius: 12px;
      overflow: auto;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
      margin-top: 12px;
    }

    .gallery img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      border-radius: 12px;
    }
  </style>
</head>

<body>
<div class="cms-wrap">
  <h1>Recipe CMS</h1>

  <section class="card">
    <h2>Title</h2>
    <input id="title" placeholder="Recipe title">
  </section>

  <section class="card">
    <h2>Main Picture</h2>
    <input id="mainPic" type="file" accept="image/*">
  </section>

  <section class="card">
    <h2>Ingredients</h2>
    <div id="ingredients"></div>
    <button onclick="addField('ingredients','Ingredient')">+ Add Ingredient</button>
  </section>

  <section class="card">
    <h2>Directions</h2>
    <div id="directions"></div>
    <button onclick="addField('directions','Step')">+ Add Step</button>
  </section>

  <section class="card">
    <h2>Gallery</h2>
    <input id="galleryInput" type="file" accept="image/*" multiple>
    <div id="gallery" class="gallery"></div>
  </section>

  <section class="card">
    <h2>Categories</h2>
    <input id="categories" placeholder="Dinner, Vegan, Comfort Food">
  </section>

  <section class="card">
    <button onclick="previewRecipe()">Preview New Recipe</button>
    <button class="publish" onclick="publishRecipe()">Publish New Recipe</button>
    <pre id="output" class="preview"></pre>
  </section>
</div>

<script>
const owner = "kevinkell-y";
const repo = "FoodBlog";
const branch = "main";

addField("ingredients", "Ingredient");
addField("directions", "Step");

function slugify(s) {
  return s.toLowerCase().trim()
    .replace(/&/g, "and")
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/^-|-$/g, "");
}

function addField(containerId, placeholder) {
  const input = document.createElement("input");
  input.placeholder = placeholder;
  document.getElementById(containerId).appendChild(input);
}

function values(id) {
  return [...document.querySelectorAll(`#${id} input`)]
    .map(i => i.value.trim())
    .filter(Boolean);
}

galleryInput.onchange = () => {
  gallery.innerHTML = "";
  [...galleryInput.files].forEach(file => {
    const img = document.createElement("img");
    img.src = URL.createObjectURL(file);
    gallery.appendChild(img);
  });
};

function buildMarkdown() {
  const title = document.getElementById("title").value.trim();
  const slug = slugify(title);
  const cats = categories.value.split(",").map(x => x.trim()).filter(Boolean);
  const mainFile = mainPic.files[0];
  const mainImage = mainFile ? `/assets/images/${slug}/${mainFile.name}` : "";

  return `---
layout: recipe
title: "${title}"
permalink: /${slug}/
image: ${mainImage}
categories:
${cats.map(c => `  - ${c}`).join("\n")}
gallery:
${[...galleryInput.files].map(f => `  - /assets/images/${slug}/${f.name}`).join("\n")}
---

## Ingredients

${values("ingredients").map(x => `- ${x}`).join("\n")}

## Directions

${values("directions").map((x, i) => `${i + 1}. ${x}`).join("\n")}
`;
}

function previewRecipe() {
  output.textContent = buildMarkdown();
}

async function fileToBase64(file) {
  const buf = await file.arrayBuffer();
  let binary = "";
  new Uint8Array(buf).forEach(b => binary += String.fromCharCode(b));
  return btoa(binary);
}

async function putFile(path, contentBase64, token, message) {
  const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
    method: "PUT",
    headers: {
      "Authorization": `Bearer ${token}`,
      "Accept": "application/vnd.github+json"
    },
    body: JSON.stringify({
      message: message,
      content: contentBase64,
      branch: branch
    })
  });

  if (!res.ok) {
    throw new Error(await res.text());
  }

  return res.json();
}

async function publishRecipe() {
  previewRecipe();

  const token = prompt("Enter your Food Blog Publish Key to publish this recipe.\n\nYour key is never stored and is used only for this publication.");
  if (!token) return;

  const title = document.getElementById("title").value.trim();
  const slug = slugify(title);

  if (!title) {
    alert("Please add a recipe title first.");
    return;
  }

  const md = buildMarkdown();
  const allImages = [...mainPic.files, ...galleryInput.files];

  try {
    for (const file of allImages) {
      await putFile(
        `assets/images/${slug}/${file.name}`,
        await fileToBase64(file),
        token,
        `Add image for ${title}`
      );
    }

    await putFile(
      `_recipes/${slug}.md`,
      btoa(unescape(encodeURIComponent(md))),
      token,
      `Publish recipe: ${title}`
    );

    output.textContent = `Published.\nURL: https://veganandcheese.com/${slug}/`;
  } catch (err) {
    output.textContent = "Publish failed:\n\n" + err.message;
  }
}
</script>
</body>
</html>
