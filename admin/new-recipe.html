<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Recipe CMS</title>
</head>
<body>
  <h1>Recipe CMS</h1>

  <h2>Title</h2>
  <input id="title" placeholder="Recipe title">

  <h2>Main Picture</h2>
  <input id="mainPic" type="file" accept="image/*">

  <h2>Ingredients</h2>
  <div id="ingredients"></div>
  <button onclick="addField('ingredients','Ingredient')">+ Add Ingredient</button>

  <h2>Directions</h2>
  <div id="directions"></div>
  <button onclick="addField('directions','Step')">+ Add Step</button>

  <h2>Gallery</h2>
  <input id="galleryInput" type="file" accept="image/*" multiple>
  <div id="gallery"></div>

  <h2>Categories</h2>
  <input id="categories" placeholder="Dinner, Vegan, Comfort Food">

  <br><br>
  <button onclick="previewRecipe()">Preview New Recipe</button>
  <button onclick="publishRecipe()">Publish New Recipe</button>

  <pre id="output"></pre>

<script>
const owner = "kevinkell-y";
const repo = "FoodBlog";
const branch = "main";

addField("ingredients","Ingredient");
addField("directions","Step");

function slugify(s){
  return s.toLowerCase().trim()
    .replace(/&/g,"and")
    .replace(/[^a-z0-9]+/g,"-")
    .replace(/^-|-$/g,"");
}

function addField(containerId, placeholder){
  const input = document.createElement("input");
  input.placeholder = placeholder;
  input.style.display = "block";
  input.style.margin = "8px 0";
  input.style.width = "100%";
  document.getElementById(containerId).appendChild(input);
}

function values(id){
  return [...document.querySelectorAll(`#${id} input`)]
    .map(i => i.value.trim())
    .filter(Boolean);
}

function buildMarkdown(){
  const title = document.getElementById("title").value.trim();
  const slug = slugify(title);
  const cats = categories.value.split(",").map(x=>x.trim()).filter(Boolean);
  const mainFile = mainPic.files[0];
  const mainImage = mainFile ? `/assets/images/${slug}/${mainFile.name}` : "";

  return `---
layout: recipe
title: "${title}"
permalink: /${slug}/
image: ${mainImage}
categories:
${cats.map(c => `  - ${c}`).join("\n")}
gallery:
${[...galleryInput.files].map(f => `  - /assets/images/${slug}/${f.name}`).join("\n")}
---

## Ingredients

${values("ingredients").map(x => `- ${x}`).join("\n")}

## Directions

${values("directions").map((x,i) => `${i+1}. ${x}`).join("\n")}
`;
}

function previewRecipe(){
  output.textContent = buildMarkdown();
}

async function fileToBase64(file){
  const buf = await file.arrayBuffer();
  let binary = "";
  new Uint8Array(buf).forEach(b => binary += String.fromCharCode(b));
  return btoa(binary);
}

async function putFile(path, contentBase64, token, message){
  const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
    method: "PUT",
    headers: {
      "Authorization": `Bearer ${token}`,
      "Accept": "application/vnd.github+json"
    },
    body: JSON.stringify({
      message,
      content: contentBase64,
      branch
    })
  });

  if(!res.ok) throw new Error(await res.text());
  return res.json();
}

async function publishRecipe(){
  previewRecipe();

  const token = prompt("Paste GitHub token. It is not saved.");
  if(!token) return;

  const title = document.getElementById("title").value.trim();
  const slug = slugify(title);
  const md = buildMarkdown();

  const allImages = [...mainPic.files, ...galleryInput.files];

  for(const file of allImages){
    await putFile(
      `assets/images/${slug}/${file.name}`,
      await fileToBase64(file),
      token,
      `Add image for ${title}`
    );
  }

  await putFile(
    `_recipes/${slug}.md`,
    btoa(unescape(encodeURIComponent(md))),
    token,
    `Publish recipe: ${title}`
  );

  output.textContent = `Published.\nURL: https://veganandcheese.com/${slug}/`;
}
</script>
</body>
</html>
